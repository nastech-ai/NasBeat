name: "🤖 Bot — Stale Issues & PRs"

on:
  schedule:
    # Run every day at 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          stale-issue-message: >
            👋 This issue has been inactive for **60 days** and has been marked as stale.
            If it is still relevant, please leave a comment or add a label.
            It will be closed in **7 days** if no further activity occurs.
          close-issue-message: >
            🔒 Closed due to 67 days of inactivity. Feel free to reopen if this is still relevant.
          stale-issue-label: "stale"
          days-before-issue-stale: 60
          days-before-issue-close: 7
          exempt-issue-labels: "pinned,security,bug,enhancement,help wanted"

          # PRs
          stale-pr-message: >
            👋 This pull request has been inactive for **30 days** and has been marked as stale.
            Please update it or it will be closed in **7 days**.
          close-pr-message: >
            🔒 Closed due to 37 days of PR inactivity. Feel free to reopen when ready.
          stale-pr-label: "stale"
          days-before-pr-stale: 30
          days-before-pr-close: 7
          exempt-pr-labels: "do-not-close,pinned"

          # Misc
          operations-per-run: 100
          remove-stale-when-updated: true
          delete-branch: false
