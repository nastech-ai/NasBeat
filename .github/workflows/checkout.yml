name: "CI"

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'fastlane/**'
      - '.github/FUNDING.yml'
      - 'ghpage/**'
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: "3.35.4"

jobs:
  # ==========================================
  # JOB 1: FLUTTER CHECKS
  # ==========================================
  flutter-check:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Dart format check
        run: dart format --set-exit-if-changed lib/ test/ || true

      - name: Static Code Analysis
        run: flutter analyze --no-fatal-infos

      - name: Unit tests
        run: flutter test || true


  # ==========================================
  # JOB 2: RUST CHECKS
  # ==========================================
  rust-check:
    name: Rust Clippy & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Cargo fmt check
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check || true

      - name: Cargo check
        run: cargo check --manifest-path rust/Cargo.toml

      - name: Cargo clippy
        run: cargo clippy --manifest-path rust/Cargo.toml -- -D warnings

      - name: Cargo tests
        run: cargo test --manifest-path rust/Cargo.toml
