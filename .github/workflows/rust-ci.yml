name: Rust CI

on:
  push:
    branches: [ main, SmartBot ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust-check:
    name: Rust check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Cargo fmt check
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check || true

      - name: Cargo clippy
        run: cargo clippy --manifest-path rust/Cargo.toml -- -D warnings

      - name: Cargo build
        run: cargo build --manifest-path rust/Cargo.toml --release

      - name: Cargo test
        run: cargo test --manifest-path rust/Cargo.toml --workspace --all-features

  cargo-audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null || true
      - name: Run cargo audit
        run: cargo audit --file rust/Cargo.lock || true
