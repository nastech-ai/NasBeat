name: "🤖 Bot — Security Audit"

on:
  push:
    branches: [main]
    paths:
      - "pubspec.yaml"
      - "pubspec.lock"
      - "rust/Cargo.toml"
      - "rust/Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "pubspec.yaml"
      - "pubspec.lock"
      - "rust/Cargo.toml"
      - "rust/Cargo.lock"
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dart-audit:
    name: "🎯 Dart dependency audit"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Run dart pub audit
        run: dart pub audit
        continue-on-error: true

      - name: Check for known-vulnerable packages
        run: |
          echo "=== Outdated packages ==="
          flutter pub outdated --no-color || true

  rust-audit:
    name: "🦀 Rust cargo audit"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null || true

      - name: Run cargo audit
        working-directory: rust
        run: cargo audit
        continue-on-error: true
