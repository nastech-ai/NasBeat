name: "🏥 NasTech Health Bot"

on:
  workflow_run:
    workflows: ["Build & Release", "CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  issues: write
  actions: read
  contents: read

jobs:
  health-report:
    name: Post build health summary
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate build health
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch last 10 runs across all workflows
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              per_page: 20
            });

            const relevant = runs.data.workflow_runs.filter(r =>
              ["Build & Release","CI"].includes(r.name) && r.status === "completed"
            );

            const passed = relevant.filter(r=>r.conclusion==="success").length;
            const failed = relevant.filter(r=>r.conclusion==="failure").length;
            const total  = relevant.length;
            const rate   = total > 0 ? Math.round(passed/total*100) : 0;
            const health = rate >= 90 ? "🟢 Healthy" : rate >= 70 ? "🟡 Degraded" : "🔴 Critical";

            const rows = relevant.slice(0,10).map(r=> {
              const icon = r.conclusion==="success"?"✅":r.conclusion==="failure"?"❌":"⚠️";
              return `| ${icon} | ${r.name} | ${r.head_branch} | ${r.conclusion} | ${r.created_at.slice(0,16)} |`;
            }).join("\n");

            const title = `🏥 [NasTech Bot] Build Health: ${health}`;
            const body = `## NasBeat Build Health Report\n\n` +
              `**Overall:** ${health} — ${rate}% pass rate (${passed}/${total})\n\n` +
              `| | Workflow | Branch | Result | Time |\n|---|---|---|---|---|\n${rows}\n\n` +
              `---\n*Generated by NasTech Health Bot after workflow run ${context.runId}.*`;

            // Only open issue if health is degraded/critical
            if (rate < 80) {
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                labels: "nastech-bot,build-health", state: "open"
              });
              if (issues.data.length > 0) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issues.data[0].number, body
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title, body, labels: ["nastech-bot","build-health"]
                });
              }
            } else {
              console.log(`Health OK: ${rate}% — no issue needed.`);
              // Close any open health issue
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                labels: "nastech-bot,build-health", state: "open"
              });
              for (const issue of issues.data) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ Build health recovered: ${rate}% — closing.`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, state: "closed"
                });
              }
            }
