name: "Build & Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark as pre-release?"
        type: boolean
        default: true
      release_notes:
        description: "Extra notes to prepend (optional)"
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: "3.35.4"

# ══════════════════════════════════════════════════════════════════
# All builds gated on pre-build quality scan
# ══════════════════════════════════════════════════════════════════

jobs:

  # ══════════════════════════════════════════════════════════════════
  # JOB 0 — PRE-BUILD SCAN
  # ══════════════════════════════════════════════════════════════════
  pre-build-scan:
    name: "🔍 Pre-Build Quality Gate"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter format (advisory)
        run: dart format --set-exit-if-changed lib/ test/ || true

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Flutter tests
        run: flutter test || true

      - name: Cargo fmt (advisory)
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check || true

      - name: Cargo clippy
        run: cargo clippy --manifest-path rust/Cargo.toml -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path rust/Cargo.toml

      - name: Dart security audit
        run: dart pub audit || true

      - name: Rust security audit
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit --file rust/Cargo.lock || true

      - name: Branding integrity scan
        run: |
          HITS=$(grep -rn "BloomeeTunes\|iamhemantindia\|HemantKArya\|hemantkarya.github.io" \
            lib/screens lib/l10n 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "❌ Stale upstream branding:"
            echo "$HITS"
            exit 1
          fi
          echo "✅ Branding check passed"

      - name: Scan summary
        if: always()
        run: |
          echo "### 🔍 Pre-Build Scan" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY


  # ══════════════════════════════════════════════════════════════════
  # JOB 1 — ANDROID  (ubuntu-latest)
  # ══════════════════════════════════════════════════════════════════
  build-android:
    name: "🤖 Android"
    runs-on: ubuntu-latest
    needs: pre-build-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "oracle"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode keystore
        id: keystore
        continue-on-error: true
        env:
          _KS: ${{ secrets.KEY_STORE }}
        run: |
          if [ -z "$_KS" ]; then
            echo "⚠️  KEY_STORE not set — using debug signing"
            exit 1
          fi
          echo "$_KS" | base64 -d > android/nasbeat.jks
          echo "✅ Keystore decoded ($(wc -c < android/nasbeat.jks) bytes)"

      - name: Write key.properties
        if: steps.keystore.outcome == 'success'
        env:
          _KP: ${{ secrets.KEY_PASSWORD }}
          _SP: ${{ secrets.STORE_PASSWORD }}
          _KA: ${{ secrets.KEY_ALIAS }}
        run: |
          # Auto-detect keystore format from magic bytes:
          # JKS  → starts with FEEDFEED
          # PKCS12 → starts with 3082 / 3083 / 3084 (DER sequence)
          MAGIC=$(xxd -p -l 4 android/nasbeat.jks 2>/dev/null || echo "00000000")
          if [[ "$MAGIC" == "feedfeed" ]]; then
            STORE_TYPE="JKS"
          else
            STORE_TYPE="PKCS12"
          fi
          echo "ℹ️  Detected keystore format: $STORE_TYPE (magic=$MAGIC)"

          # Verify credentials BEFORE writing key.properties.
          # "Given final block not properly padded" = wrong password → fall back to debug.
          KEYTOOL_OUT=$(keytool -list \
            -keystore android/nasbeat.jks \
            -storepass "$_SP" \
            -storetype "$STORE_TYPE" \
            -noprompt 2>&1 || true)

          if echo "$KEYTOOL_OUT" | grep -q "error\|exception\|failed\|invalid" -i; then
            echo "⚠️  Keystore credential check failed — falling back to debug signing."
            echo "   (Fix KEY_PASSWORD / STORE_PASSWORD / KEY_ALIAS secrets to enable release signing)"
            echo "$KEYTOOL_OUT" | head -5
            rm -f android/nasbeat.jks
          else
            printf 'keyPassword=%s\nstorePassword=%s\nkeyAlias=%s\nstoreType=%s\n' \
              "$_KP" "$_SP" "$_KA" "$STORE_TYPE" > android/key.properties
            echo "✅ key.properties written (credentials verified)"
          fi

      - name: Build Android APKs (split-per-abi)
        run: flutter build apk --release --split-per-abi --build-number ${{ github.run_number }}

      - name: Rename APKs — production format
        run: |
          V="${{ needs.pre-build-scan.outputs.version }}"
          B="${{ github.run_number }}"
          OUT=build/app/outputs/flutter-apk
          mv $OUT/app-release.apk             $OUT/NasBeat-V${V}-android-universal.apk    || true
          mv $OUT/app-armeabi-v7a-release.apk  $OUT/NasBeat-V${V}-android-armv7.apk        || true
          mv $OUT/app-arm64-v8a-release.apk    $OUT/NasBeat-V${V}-android-arm64.apk        || true
          mv $OUT/app-x86_64-release.apk       $OUT/NasBeat-V${V}-android-x86_64.apk       || true
          ls -lh $OUT/NasBeat-*.apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Release-Android
          path: build/app/outputs/flutter-apk/NasBeat-V*.apk

      - name: Publish Android to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GH_TOKEN }}
          prerelease: ${{ inputs.prerelease }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          artifacts: |
            build/app/outputs/flutter-apk/NasBeat-V${{ needs.pre-build-scan.outputs.version }}-android-universal.apk
            build/app/outputs/flutter-apk/NasBeat-V${{ needs.pre-build-scan.outputs.version }}-android-armv7.apk
            build/app/outputs/flutter-apk/NasBeat-V${{ needs.pre-build-scan.outputs.version }}-android-arm64.apk
            build/app/outputs/flutter-apk/NasBeat-V${{ needs.pre-build-scan.outputs.version }}-android-x86_64.apk


  # ══════════════════════════════════════════════════════════════════
  # JOB 2 — WINDOWS  (windows-2022)
  # ══════════════════════════════════════════════════════════════════
  build-windows:
    name: "🪟 Windows"
    runs-on: windows-2022
    needs: pre-build-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release --build-number ${{ github.run_number }}

      - name: Package — production format
        shell: powershell
        run: |
          $V = "${{ needs.pre-build-scan.outputs.version }}"
          $Name = "NasBeat-V${V}-windows-x64.zip"
          Compress-Archive -Path build/windows/x64/runner/Release/* -Destination build/windows/x64/$Name
          Write-Host "Created: $Name"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Release-Windows
          path: build/windows/x64/NasBeat-V*-windows-x64.zip

      - name: Publish Windows to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GH_TOKEN }}
          prerelease: ${{ inputs.prerelease }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          artifacts: build/windows/x64/NasBeat-V${{ needs.pre-build-scan.outputs.version }}-windows-x64.zip


  # ══════════════════════════════════════════════════════════════════
  # JOB 3 — LINUX  (ubuntu-latest)
  # ══════════════════════════════════════════════════════════════════
  build-linux:
    name: "🐧 Linux"
    runs-on: ubuntu-latest
    needs: pre-build-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release --build-number ${{ github.run_number }}

      - name: Package — production format
        run: |
          V="${{ needs.pre-build-scan.outputs.version }}"
          NAME="NasBeat-V${V}-linux-x64.tar.gz"
          tar -czf "$NAME" -C build/linux/x64/release/bundle .
          ls -lh "$NAME"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Release-Linux
          path: NasBeat-V*-linux-x64.tar.gz

      - name: Publish Linux to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: NasBeat-V${{ needs.pre-build-scan.outputs.version }}-linux-x64.tar.gz
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GH_TOKEN }}
          prerelease: ${{ inputs.prerelease }}
          allowUpdates: true
          omitBodyDuringUpdate: true


  # ══════════════════════════════════════════════════════════════════
  # JOB 4 — macOS  (macos-latest)
  # ══════════════════════════════════════════════════════════════════
  build-macos:
    name: "🍎 macOS"
    runs-on: macos-latest
    needs: pre-build-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release --build-number ${{ github.run_number }}

      - name: Package — production format
        run: |
          V="${{ needs.pre-build-scan.outputs.version }}"
          NAME="NasBeat-V${V}-macos-universal.zip"
          cd build/macos/Build/Products/Release
          zip -r "$OLDPWD/$NAME" NasBeat.app
          ls -lh "$OLDPWD/$NAME"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Release-macOS
          path: NasBeat-V*-macos-universal.zip

      - name: Publish macOS to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: NasBeat-V${{ needs.pre-build-scan.outputs.version }}-macos-universal.zip
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GH_TOKEN }}
          prerelease: ${{ inputs.prerelease }}
          allowUpdates: true
          omitBodyDuringUpdate: true


  # ══════════════════════════════════════════════════════════════════
  # JOB 5 — RELEASE NOTES BOT
  # ══════════════════════════════════════════════════════════════════
  release-notes-bot:
    name: "📝 Release Notes"
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-linux, build-macos]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        env:
          VERSION:       ${{ needs.pre-build-scan.outputs.version }}
          GH_SHA:        ${{ github.sha }}
          GH_RUN_ID:     ${{ github.run_id }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_REPOSITORY: ${{ github.repository }}
          CUSTOM_NOTES:  ${{ inputs.release_notes }}
        run: |
          python3 - << 'PYEOF'
          import os, subprocess, textwrap
          from datetime import datetime, timezone

          version   = os.environ["VERSION"]
          build     = "${{ github.run_number }}"
          tag       = "${{ github.ref_name }}"
          sha       = os.environ["GH_SHA"]
          run_id    = os.environ["GH_RUN_ID"]
          server    = os.environ["GH_SERVER_URL"]
          repo      = os.environ["GH_REPOSITORY"]
          custom    = os.environ.get("CUSTOM_NOTES", "").strip()
          date_str  = datetime.now(timezone.utc).strftime("%B %d, %Y")
          run_url   = f"{server}/{repo}/actions/runs/{run_id}"

          prev = subprocess.run(
              ["git", "tag", "--sort=-version:refname"],
              capture_output=True, text=True
          ).stdout.strip().splitlines()
          prev_tags  = [t for t in prev if t != tag]
          log_range  = f"{prev_tags[0]}..HEAD" if prev_tags else "HEAD~15..HEAD"
          commits    = subprocess.run(
              ["git", "log", "--pretty=format:- %s", log_range, "--no-merges"],
              capture_output=True, text=True
          ).stdout.strip() or "- General improvements and stability fixes"

          changelog = custom if custom else commits

          notes = f"""\
          ## 🎵 NasBeat {version}

          > Released **{date_str}** &nbsp;·&nbsp; Open-source multi-source music player by [NasTech](https://github.com/nastech-ai)

          ---

          ### 📋 What's New

          {changelog}

          ---

          ### 📦 Downloads

          | Platform | Architecture | File | Notes |
          |----------|-------------|------|-------|
          | 🤖 Android | Universal | `NasBeat-V{version}-android-universal.apk` | ✅ Recommended for all devices |
          | 🤖 Android | ARM 64-bit | `NasBeat-V{version}-android-arm64.apk` | Modern phones (2017+) |
          | 🤖 Android | ARM 32-bit | `NasBeat-V{version}-android-armv7.apk` | Older devices |
          | 🤖 Android | x86 64-bit | `NasBeat-V{version}-android-x86_64.apk` | Emulators / Chromebooks |
          | 🪟 Windows | x64 | `NasBeat-V{version}-windows-x64.zip` | Windows 10 / 11 |
          | 🐧 Linux | x64 | `NasBeat-V{version}-linux-x64.tar.gz` | Ubuntu 20.04+, Debian, Fedora |
          | 🍎 macOS | Universal | `NasBeat-V{version}-macos-universal.zip` | macOS 10.14 Mojave+ |

          > **Not sure which Android APK?** Download **Universal** — works on every device.

          ---

          ### 🚀 Installation

          <details>
          <summary><b>🤖 Android</b></summary>

          1. Download the APK for your device *(Universal recommended)*
          2. Go to **Settings → Security → Install unknown apps** and enable for your file manager
          3. Tap the APK and follow the prompts

          </details>

          <details>
          <summary><b>🪟 Windows</b></summary>

          1. Download and **extract** `NasBeat-V{version}-windows-x64.zip`
          2. Run **`NasBeat.exe`** from the extracted folder — no installer needed

          </details>

          <details>
          <summary><b>🐧 Linux</b></summary>

          ```bash
          tar -xzf NasBeat-V{version}-linux-x64.tar.gz
          ./nasbeat
          ```

          Requires: `libgtk-3`, `libglib2.0`, compatible audio backend

          </details>

          <details>
          <summary><b>🍎 macOS</b></summary>

          1. Download and unzip `NasBeat-V{version}-macos-universal.zip`
          2. Drag **NasBeat.app** into **Applications**
          3. **First launch:** right-click → **Open** to bypass Gatekeeper

          > Requires macOS 10.14 Mojave or later

          </details>

          ---

          ### 🔧 Build Info

          | Field | Value |
          |-------|-------|
          | Version | `{version}` |
          | Build | `#{build}` |
          | Flutter | `3.35.4 stable` |
          | Commit | [`{sha[:7]}`]({server}/{repo}/commit/{sha}) |
          | CI Run | [#{build}]({run_url}) |

          ---

          *Built with ❤️ by [NasTech](https://github.com/nastech-ai)*
          """

          notes = textwrap.dedent(notes)
          with open("/tmp/release_notes.md", "w") as f:
              f.write(notes)
          print("Release notes written — preview:")
          print(notes[:500])
          PYEOF

      - name: Publish release with full notes
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GH_TOKEN }}
          prerelease: ${{ inputs.prerelease }}
          allowUpdates: true
          omitArtifactsDuringUpdate: true
          bodyFile: /tmp/release_notes.md


  # ══════════════════════════════════════════════════════════════════
  # JOB 6 — GOOGLE PLAY UPLOAD
  # ══════════════════════════════════════════════════════════════════
  deploy-play-store:
    name: "🛒 Google Play (internal)"
    runs-on: ubuntu-latest
    needs: [build-android, release-notes-bot]
    env:
      HAS_PLAY_SECRET: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT != '' }}

    steps:
      - name: Skip check
        if: env.HAS_PLAY_SECRET != 'true'
        run: |
          echo "⚠️  PLAY_STORE_SERVICE_ACCOUNT not set — skipping Google Play upload"
          exit 0

      - name: Download Android artifacts
        if: env.HAS_PLAY_SECRET == 'true'
        uses: actions/download-artifact@v4
        with:
          name: Release-Android
          path: artifacts/

      - name: Find arm64 APK
        if: env.HAS_PLAY_SECRET == 'true'
        id: apk
        run: |
          APK=$(find artifacts/ -name "*arm64*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "APK: $APK"

      - name: Upload to Google Play internal track
        if: env.HAS_PLAY_SECRET == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: ai.nastech.nasbeat
          releaseFiles: ${{ steps.apk.outputs.path }}
          track: internal
          status: draft
          releaseName: NasBeat-V${{ needs.pre-build-scan.outputs.version }}
