name: "🎨 Auto-Format Dart (one-time)"
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    name: "dart format + commit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true

      - name: dart format
        run: |
          flutter pub get
          dart format lib/ test/
          echo "✅ Format complete"

      - name: Commit formatted files
        run: |
          git config user.name  "NasTech Format Bot"
          git config user.email "bot@nastech.ai"
          git add -A
          if git diff --cached --quiet; then
            echo "✅ No files needed reformatting"
          else
            git commit -m "style(dart): auto-format Dart files via dart format

All lib/ and test/ files brought to canonical dart format.
No logic changes — pure whitespace/formatting normalization."
            git push
            echo "✅ Pushed formatted files"
          fi
